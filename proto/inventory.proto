syntax = "proto3";

package inventory;

// Core product model representing a complete database record.
// Product IDs are UUID strings generated by Prisma.
message ProductData {
  string product_id = 1;
  string name = 2;
  int32 stock = 3;
  double price = 4;
  string category = 5;
  string description = 6;
}

// --- Request / Response Messages ---

message AddProductRequest {
  string name = 1;
  int32 stock = 2;
  double price = 3;
  string category = 4;
  string description = 5;
}

message AddProductResponse {
  ProductData product = 1; // Returns the full data including the new ID
}

message UpdateProductRequest {
  string product_id = 1;
  
  // Partial update payload for mutable product fields.
  message UpdatePayload {
    string name = 1;
    int32 stock = 2;
    double price = 3;
    string category = 4;
    string description = 5;
  }
  
  UpdatePayload data = 2;
}

message UpdateProductResponse {
  ProductData product = 1;
}

message ReserveStockRequest {
  string product_id = 1;
  int32 amount = 2;
}

message ReserveStockResponse {
  ProductData product = 1; // Returns updated product state after reservation
}

message GetLowStockProductsRequest {
  int32 threshold = 1;
}

message GetLowStockProductsResponse {
  repeated ProductData products = 1;
}

// --- Service Definition ---

service InventoryService {
  rpc AddProduct(AddProductRequest) returns (AddProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc ReserveStock(ReserveStockRequest) returns (ReserveStockResponse);
  rpc GetLowStockProducts(GetLowStockProductsRequest) returns (GetLowStockProductsResponse);
}