syntax = "proto3";

package cart;

message CartItem {
  int32 productId = 1;
  string name = 2;
  double price = 3;
  string category = 4;
  int32 quantity = 5;
}

message AddItemRequest {
  int32 user_id = 1;
  int32 productId = 2;
  int32 quantity = 3;
}

message RemoveItemRequest {
  int32 user_id = 1;
  int32 productId = 2;
}

message CartUserRequest {
  int32 user_id = 1;
}

message MessageResponse {
  string message = 1;
}

message TotalSumResponse {
  double totalAmount = 1;
}

message GetCartResponse {
  repeated CartItem items = 1;
}

service CartService {
  rpc AddItem(AddItemRequest) returns (MessageResponse);
  rpc RemoveItem(RemoveItemRequest) returns (MessageResponse);
  rpc TotalSum(CartUserRequest) returns (TotalSumResponse);
  rpc GetCart(CartUserRequest) returns (GetCartResponse);
}