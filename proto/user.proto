syntax = "proto3";

package user;

// The User service definition.
service UserService {
  // Logs in a user with email and password
  rpc Login (LoginRequest) returns (UserResponse);

  // Registers a new user
  rpc Register (RegisterRequest) returns (UserResponse);

  // Verifies user email via a token
  rpc VerifyEmail (VerifyEmailRequest) returns (UserResponse);

  // Sends a password reset link to the user's email
  rpc ForgotPassword (ForgotPasswordRequest) returns (UserResponse);

  // Resets the user's password using a reset token
  rpc ResetPassword (ResetPasswordRequest) returns (UserResponse);

  // Completes Google OAuth using the authorization code
  rpc GoogleCallback (GoogleCallbackRequest) returns (UserResponse);
}

// --- Request Messages ---

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message VerifyEmailRequest {
  string token = 1;
}

message ForgotPasswordRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string newPassword = 2;
}

message GoogleCallbackRequest {
  string code = 1;
}

// --- Response Messages ---

message User {
  string id = 1;
  string name = 2;
  string email = 3;
  // Add other fields returned by your domain model here
}

message UserResponse {
  User user = 1;
  string accessToken = 2;
  string message = 3;
}
