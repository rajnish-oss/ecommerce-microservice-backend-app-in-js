syntax = "proto3";

package payment;

// ===== Stripe Product Messages =====
message CreateProductRequest {
  string productId = 1;
  string name = 2;
  double price = 3;
}

message CreateProductResponse {
  string id = 1;
  string message = 2;
}

message UpdateProductRequest {
  string productId = 1;
  string name = 2;
  double price = 3;
}

message DeleteProductRequest{
  string productId = 1;
}

message UpdateProductResponse {
  string message = 1;
}

message CreateCheckoutSessionRequest {
  string productId = 1;
  int32 quantity = 2;
  string userId = 3;
  string orderId = 4;
}

message CreateCheckoutSessionResponse {
  string url = 1;
}

message WebhookRequest {
  string stripe_signature = 1;
  bytes raw_body = 2;          // 'bytes' perfectly maps to your Node.js Buffer
}

message WebhookResponse {
  bool success = 1;
  string message = 2;
  int32 http_status_code = 3;  // Relayed back so the Gateway knows what to tell Stripe
}

message CreateRefundRequest {
  string orderId = 1;
}

message CreateRefundResponse {
  string message = 1;
}

// ===== Payment Service =====
service PaymentService {
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (UpdateProductResponse);
  rpc CreateCheckoutSession(CreateCheckoutSessionRequest) returns (CreateCheckoutSessionResponse);
  rpc HandleStripeWebhook (WebhookRequest) returns (WebhookResponse);
  rpc CreateRefund(CreateRefundRequest) returns (CreateRefundResponse);
}

